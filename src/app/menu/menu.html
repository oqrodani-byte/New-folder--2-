<div class="menu-container">
  <h1 class="menu-title">Our Menu</h1>

 
  <div class="category-nav" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap;">
    
    <button 
      (click)="setCategory(null)" 
      [style.background]="selectedCategoryId === null ? '#c5a059' : 'transparent'"
      [style.color]="selectedCategoryId === null ? 'black' : 'white'"
      style="border: 1px solid #c5a059; padding: 10px 25px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-family: 'Cinzel', serif; text-transform: uppercase; font-size: 13px;">
      All
    </button>
    
    
    @for (cat of categories; track cat.id) {
      <button 
        (click)="setCategory(cat.id)"
        [style.background]="selectedCategoryId === cat.id ? '#c5a059' : 'transparent'"
        [style.color]="selectedCategoryId === cat.id ? 'black' : 'white'"
        style="border: 1px solid #c5a059; padding: 10px 25px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-family: 'Cinzel', serif; text-transform: uppercase; font-size: 13px;">
        {{ cat.name }}
      </button>
    }
  </div>

  
  <div class="controls-luxury">
    <div class="filter-box">
      
      <input type="text" [(ngModel)]="searchQuery" (input)="applyFilters()" placeholder="Search dish...">
      
      
      <div class="price-inputs">
        <input type="number" [(ngModel)]="minPrice" (input)="applyFilters()" placeholder="Min $">
        <input type="number" [(ngModel)]="maxPrice" (input)="applyFilters()" placeholder="Max $">
      </div>

      
      <select [(ngModel)]="minRate" (change)="applyFilters()">
        <option [value]="0">Any Rating</option>
        <option [value]="3">3+ Stars</option>
        <option [value]="4">4+ Stars</option>
      </select>

      
      <div class="spice-range-container" style="display: flex; flex-direction: column; min-width: 150px; color: white;">
        <label style="font-size: 12px; margin-bottom: 4px;">Min Heat: {{ minSpice }} 🌶️</label>
        <input type="range" min="0" max="5" step="1" [(ngModel)]="minSpice" (input)="applyFilters()">
      </div>
    </div>

    
    <div class="sort-box">
      <button (click)="sort('price')">Expensive First</button>
      <button (click)="sort('rate')">Best Rated</button>
      <button class="reset" (click)="clear()">Reset Filters</button>
    </div>
  </div>

  
  <div class="product-grid">
    @for (item of filteredArr; track item.id) {
      <div class="product-card" [routerLink]="['/details']" [queryParams]="{id : item.id}">
        <div class="image-wrapper">
          <img [src]="item.image || 'assets/placeholder.jpg'" [alt]="item.name">
        </div>

        <div class="card-body">
          <div class="header-row">
            <h3>{{ item.name }}</h3>
            <span class="price">${{ item.price }}</span>
          </div>

          <div class="footer-row">
           
            <div class="rating">
              @for (star of [1,2,3,4,5]; track $index) {
                <span [class.filled]="$index < (item.rate || 0)">★</span>
              }
            </div>
            
            
            <div class="spiciness" *ngIf="item.spiciness > 0">
              {{ '🌶️'.repeat(item.spiciness) }}
            </div>
            <div class="no-spice" *ngIf="!item.spiciness || item.spiciness === 0" style="font-size: 11px; opacity: 0.5;">
              Not Spicy
            </div>
          </div>

          
          <div class="actions">
            <button 
              class="add-btn" 
              (click)="addToOrder(item); $event.stopPropagation()">
              Add to Order
            </button>
          </div>
        </div>
      </div>
    } @empty {
      
      <div class="no-results" style="text-align: center; width: 100%; color: #aaa; padding: 80px 0;">
        <p style="font-size: 20px; font-family: 'Cinzel', serif;">No dishes found in this category</p>
        <button (click)="clear()" style="background: none; border: 1px solid #c5a059; color: #c5a059; padding: 10px 25px; border-radius: 20px; margin-top: 20px; cursor: pointer; text-transform: uppercase;">
          Show All Menu
        </button>
      </div>
    }
  </div>
</div>
