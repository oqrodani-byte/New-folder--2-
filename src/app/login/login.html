<div class="restaurant-auth-page">
  <div class="glass-card">
    <div class="brand-header">
      <h2>Welcome back</h2>
      <p>Please enter your details to feast</p>
    </div>

    <form #myForm="ngForm" (ngSubmit)="login(myForm.value)">
      <div class="input-group">
        <input type="email" placeholder="Email Address" ngModel name="email" required>
      </div>
      
      <div class="input-group">
        <input type="password" placeholder="Password" ngModel name="password" required>
      </div>

      <button type="submit" class="btn-order">Log In</button>
    </form>

    <a routerLink="/register" class="register-link">
      Join our community — <span>Register</span>
    </a>
  </div>
</div>
