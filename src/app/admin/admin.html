<div class="admin-container">
  <div class="admin-card">
    <div class="admin-header">
      <h1 class="admin-title">Chef's Dashboard</h1>
      <p class="admin-subtitle">Add a new masterpiece to your menu</p>
    </div>

    <div class="form-body">
     
      <div class="input-group">
        <label>Dish Name</label>
        <input type="text" [(ngModel)]="name" placeholder="e.g. Royal Steak">
      </div>

      
      <div class="row">
        <div class="input-group">
          <label>Price ($)</label>
          <input type="number" [(ngModel)]="price" placeholder="0.00">
        </div>
        <div class="input-group">
          <label>Spiciness: {{ spiciness }} 🌶️</label>
          <input type="range" min="0" max="5" [(ngModel)]="spiciness" class="range-input">
        </div>
      </div>

      
      <div class="input-group">
        <label>Image URL</label>
        <input type="text" [(ngModel)]="image" placeholder="https://images.unsplash.com/...">
      </div>

      
      <div class="actions">
        <button class="save-btn" (click)='saveProduct()'>Publish Dish</button>
        <button class="back-btn" routerLink="/menu">Cancel</button>
      </div>
    </div>
  </div>
</div>




  <footer class="main-footer">
    <div class="footer-content">
      <div class="footer-column brand">
        <h2>Foodie</h2>
        <p>Delicious food delivered to your door</p>
      </div>

      <div class="footer-column contact">
        <h3>Contact</h3>
        <p>123 Food Street, Tbilisi, Georgia</p>
        <p>Phone: (555) 123-4567</p>
        <p>Mon-Sun: 10AM - 10PM</p>
      </div>

      <div class="footer-column links">
        <h3>Quick Links</h3>
        <a routerLink="/menu">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Terms of Service</a>
        <a href="#">Privacy Policy</a>
      </div>

      <div class="footer-column newsletter">
        <h3>Newsletter</h3>
        <p>Subscribe to get special offers</p>
        <div class="subscribe-box">
          <input type="email" placeholder="Your email">
          <button>Subscribe</button>
        </div>
      </div>
    </div>
